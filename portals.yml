  - name: Greenhouse — Crypto CSM & Support
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Customer Success" OR "Account Executive" OR "Support Specialist" OR "Project Manager" crypto OR blockchain OR "digital assets" ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
