# Portal Scanner Configuration — Sokhana Caza
# Targeting: Institutional Sales, FX/Fintech, Electronic Trading, Remote roles
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Sales & BD --
    - "Sales Director"
    - "Head of Sales"
    - "VP Sales"
    - "VP of Sales"
    - "Vice President Sales"
    - "Business Development"
    - "Account Executive"
    - "Account Director"
    - "Account Manager"
    - "Institutional Sales"
    - "Electronic Trading Sales"
    - "Sales Manager"
    - "Regional Sales"
    - "Enterprise Sales"
    # -- Client Success --
    - "Customer Success"
    - "Client Success"
    - "Client Relationship"
    - "Relationship Manager"
    # -- Trading & Markets --
    - "Trading Support"
    - "Trading Analyst"
    - "FX Sales"
    - "FX Specialist"
    - "Fixed Income Sales"
    # -- Analysis & Project Management --
    - "Business Analyst"
    - "Solutions Consultant"
    - "Project Manager"
    - "Program Manager"
    - "Implementation Manager"
    - "Delivery Manager"
    # -- Support --
    - "Support Specialist"
    - "Technical Support"
    - "Client Support"
    - "Operations Specialist"

  negative:
    - "Junior"
    - "Graduate"
    - "Intern"
    - "Entry Level"
    - "Software Engineer"
    - "Data Engineer"
    - "Data Scientist"
    - "Quantitative"
    - "Quant "
    - "Developer"
    - "DevOps"
    - "Backend"
    - "Frontend"
    - "iOS"
    - "Android"

  seniority_boost:
    - "Senior"
    - "Director"
    - "Head"
    - "VP"
    - "Principal"
    - "Lead"

# -- Location filter --
# Applied after fetching JDs. Candidate is based in South Africa (Johannesburg, SAST UTC+2).
# "Remote" alone is NOT sufficient — must be remote-from-SA eligible.

location_filter:
  # At least one positive signal should appear in the JD or job metadata.
  # If none found, flag as "unverified — check manually" (do not auto-skip).
  positive:
    - "South Africa"
    - "globally remote"
    - "global remote"
    - "work from anywhere"
    - "anywhere in the world"
    - "worldwide"
    - "EMEA"
    - "Africa"
    - "international"
    - "all time zones"
    - "any location"
  # If any of these appear, the role is likely US/Americas-only — skip or flag.
  negative:
    - "must be located in the US"
    - "must be located in the United States"
    - "US only"
    - "United States only"
    - "US-based only"
    - "must reside in the US"
    - "must be based in the US"
    - "authorized to work in the US"
    - "US work authorization required"
    - "must have US work authorization"
    - "Americas only"
    - "North America only"
    - "Canada or US"
    - "US or Canada only"

# -- Search queries --

search_queries:

  # -- HiringCafe --
  - name: HiringCafe — Sales Director & BD Fintech
    query: 'site:hiringcafe.com "Sales Director" OR "Head of Sales" OR "Business Development" fintech OR "financial markets" ("South Africa" OR EMEA OR "globally remote" OR worldwide OR "work from anywhere")'
    enabled: true

  - name: HiringCafe — Account Executive & Trading
    query: 'site:hiringcafe.com "Account Executive" OR "Account Manager" OR "Trading Support" fintech ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
    enabled: true

  - name: HiringCafe — Customer Success Fintech
    query: 'site:hiringcafe.com "Customer Success" OR "Client Success" fintech OR SaaS ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
    enabled: true

  # -- WeWorkRemotely --
  - name: WeWorkRemotely — Sales & BD
    query: 'site:weworkremotely.com "Sales Director" OR "Account Executive" OR "Business Development" fintech OR "financial services" ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
    enabled: true

  - name: WeWorkRemotely — Customer Success
    query: 'site:weworkremotely.com "Customer Success Manager" OR "Account Manager" fintech OR SaaS ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
    enabled: true

  # -- Remotive --
  - name: Remotive — Sales & Customer Success
    query: 'site:remotive.com "Sales Director" OR "Account Executive" OR "Customer Success" fintech OR "financial markets" ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
    enabled: true

  # -- Greenhouse (fintech companies) --
  - name: Greenhouse — Fintech Sales Director
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Sales Director" OR "Head of Sales" fintech OR "capital markets" OR "electronic trading" ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
    enabled: true

  - name: Greenhouse — Account Executive & CSM Fintech
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Account Executive" OR "Customer Success Manager" fintech OR "financial markets" ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
    enabled: true

  # -- Crypto job boards --
  - name: CryptoJobsList — CSM & Support
    query: 'site:cryptojobslist.com "Customer Success" OR "Account Executive" OR "Support" OR "Project Manager" ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
    enabled: true

  - name: Web3.career — CSM & Account Executive
    query: 'site:web3.career "Customer Success" OR "Account Executive" OR "Support Specialist" OR "Project Manager" ("South Africa" OR EMEA OR "globally remote" OR worldwide)'
