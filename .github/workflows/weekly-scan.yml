name: Weekly Job Scan

on:
  schedule:
    - cron: '0 5 * * 1'   # Monday 07:00 SAST — WebSearch scan
    - cron: '0 11 * * 1'  # Monday 13:00 SAST — Greenhouse API scan
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type to run'
        required: true
        default: 'greenhouse'
        type: choice
        options:
          - websearch
          - greenhouse

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Determine scan type
        id: meta
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TYPE="${{ inputs.scan_type }}"
          elif [ "${{ github.event.schedule }}" == "0 5 * * 1" ]; then
            TYPE="websearch"
          else
            TYPE="greenhouse"
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "Running $TYPE scan"

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT_FILE=".github/prompts/${{ steps.meta.outputs.type }}-scan.md"
          claude --allowedTools "Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" \
            --print \
            -p "$(cat $PROMPT_FILE)"

      - name: Count new offers
        id: count
        run: |
          COUNT=$(git diff data/pipeline.md | grep "^+" | grep -c "\- \[ \]" || true)
          echo "new_count=${COUNT:-0}" >> $GITHUB_OUTPUT
          echo "New offers found: ${COUNT:-0}"

      - name: Commit results
        run: |
          git config user.email "career-ops-bot@github.com"
          git config user.name "career-ops"
          git add data/pipeline.md data/scan-history.tsv
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: ${{ steps.meta.outputs.type }} scan ${{ steps.meta.outputs.date }} — ${{ steps.count.outputs.new_count }} new offers"
          git push

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          TYPE="${{ steps.meta.outputs.type }}"
          DATE="${{ steps.meta.outputs.date }}"
          COUNT="${{ steps.count.outputs.new_count }}"
          STATUS="${{ job.status }}"

          if [ "$TYPE" == "websearch" ]; then
            TITLE="Weekly WebSearch Scan — $DATE"
            COLOR=5814783
          else
            TITLE="Greenhouse API Scan — $DATE"
            COLOR=10181046
          fi

          if [ "$STATUS" != "success" ]; then
            NOTE="Scan encountered an error — check GitHub Actions logs"
          elif [ "$COUNT" == "0" ]; then
            NOTE="No new offers this week"
          else
            NOTE="Run /career-ops pipeline to evaluate"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"$TITLE\",\"color\":$COLOR,\"fields\":[{\"name\":\"New offers found\",\"value\":\"$COUNT\",\"inline\":true},{\"name\":\"Next step\",\"value\":\"$NOTE\",\"inline\":false}],\"footer\":{\"text\":\"career-ops — github actions\"}}]}"
